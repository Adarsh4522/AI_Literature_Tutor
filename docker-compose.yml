services:
  litwise:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litwise
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    volumes:
      - ./backend/cache:/app/backend/cache
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true